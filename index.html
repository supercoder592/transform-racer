<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>變形戰車 PRO：海・空・潛</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; background:#02070d; touch-action:none;
    font-family:"PingFang TC","Microsoft JhengHei",system-ui,sans-serif; user-select:none; -webkit-user-select:none; }
  #c { position:fixed; inset:0; display:block; }
  :root { --cy:#4fd8ff; --mg:#ff4fd8; }

  /* ---------- HUD ---------- */
  .hud { position:fixed; pointer-events:none; color:var(--cy); z-index:20;
    text-shadow:0 0 8px rgba(79,216,255,.9), 0 0 24px rgba(79,216,255,.4); }
  #score { top:calc(10px + env(safe-area-inset-top)); left:14px; font-size:19px; font-weight:800; }
  #gyroPill { top:calc(38px + env(safe-area-inset-top)); left:14px; font-size:12px; font-weight:700;
    background:rgba(6,26,44,.6); border:1px solid rgba(79,216,255,.5); border-radius:14px;
    padding:3px 10px; display:none; letter-spacing:1px; }
  #modeName { top:calc(10px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-size:14px; font-weight:800; letter-spacing:5px; background:rgba(4,22,38,.55);
    padding:5px 18px; border-radius:20px; border:1px solid rgba(79,216,255,.55); }
  #alti { top:calc(46px + env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    font-size:12px; font-weight:700; opacity:.95; letter-spacing:2px; }
  #speedo { bottom:calc(100px + env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%); text-align:center; }
  #speedNum { font-size:38px; font-weight:900; font-variant-numeric:tabular-nums; line-height:1;
    font-family:"SF Pro Display",system-ui,sans-serif; }
  #speedUnit { font-size:10px; opacity:.85; letter-spacing:3px; }
  #toast { top:30%; left:50%; transform:translate(-50%,-50%) scale(.8); font-size:26px; font-weight:900;
    letter-spacing:6px; opacity:0; transition:all .25s; color:#ffe27a;
    text-shadow:0 0 14px rgba(255,200,80,.9); }
  #toast.show { opacity:1; transform:translate(-50%,-50%) scale(1); }

  /* ---------- 右側：變身鍵 ---------- */
  #modes { position:fixed; right:10px; top:50%; transform:translateY(-50%); display:flex;
    flex-direction:column; gap:9px; z-index:30; }
  .modeBtn { width:66px; height:56px; border-radius:14px; border:1.5px solid rgba(79,216,255,.55);
    background:rgba(5,24,42,.62); backdrop-filter:blur(6px); color:#cfeeff; font-size:20px;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    transition:transform .12s, box-shadow .25s; }
  .modeBtn small { font-size:9px; font-weight:800; letter-spacing:2px; color:var(--cy); }
  .modeBtn.active { border-color:#fff; color:#04121f;
    background:linear-gradient(160deg,#7fe6ff,#2fa8e8); box-shadow:0 0 20px rgba(79,216,255,.85);
    transform:scale(1.07); }
  .modeBtn.active small { color:#04121f; }
  .modeBtn:active { transform:scale(.93); }

  /* ---------- 左上：視角 / 水平儀 ---------- */
  #tools { position:fixed; left:10px; top:calc(66px + env(safe-area-inset-top)); display:flex;
    flex-direction:column; gap:9px; z-index:30; }
  .toolBtn { width:58px; height:50px; border-radius:13px; border:1.5px solid rgba(255,79,216,.5);
    background:rgba(30,6,26,.6); backdrop-filter:blur(6px); color:#ffd6f4; font-size:18px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; transition:all .2s; }
  .toolBtn small { font-size:9px; font-weight:800; letter-spacing:1px; color:var(--mg); }
  .toolBtn.active { background:linear-gradient(160deg,#ff8fe0,#d02fb0); color:#2a0522;
    border-color:#fff; box-shadow:0 0 18px rgba(255,79,216,.8); }
  .toolBtn.active small { color:#2a0522; }
  .toolBtn:active { transform:scale(.93); }

  /* ---------- 搖桿與油門 ---------- */
  #stick { position:fixed; left:18px; bottom:calc(18px + env(safe-area-inset-bottom)); width:126px; height:126px;
    border-radius:50%; background:rgba(79,216,255,.07); border:1.5px solid rgba(79,216,255,.4);
    box-shadow:inset 0 0 24px rgba(79,216,255,.15); z-index:30; }
  #knob { position:absolute; left:50%; top:50%; width:54px; height:54px; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #b6ecff, #2f9cd8);
    box-shadow:0 0 14px rgba(79,216,255,.7); transform:translate(-50%,-50%); }
  #rightPad { position:fixed; right:12px; bottom:calc(14px + env(safe-area-inset-bottom)); display:flex;
    gap:10px; align-items:flex-end; z-index:30; }
  .pad { border-radius:50%; border:1.5px solid rgba(255,255,255,.5); color:#fff; font-weight:900;
    display:flex; align-items:center; justify-content:center; text-shadow:0 1px 4px rgba(0,0,0,.5); }
  .pad:active { filter:brightness(1.3); }
  #btnGas { width:86px; height:86px; font-size:15px; letter-spacing:2px;
    background:radial-gradient(circle at 35% 30%, rgba(90,230,150,.85), rgba(20,140,80,.75)); }
  #btnBrake { width:60px; height:60px; font-size:12px;
    background:radial-gradient(circle at 35% 30%, rgba(255,120,110,.8), rgba(170,45,40,.75)); }
  #btnFire { width:64px; height:64px; font-size:22px; margin-right:4px;
    background:radial-gradient(circle at 35% 30%, rgba(255,200,90,.85), rgba(210,110,20,.8)); }

  /* ---------- 駕駛艙外框 ---------- */
  .cockpit { position:fixed; inset:0; pointer-events:none; z-index:10; opacity:0; transition:opacity .35s;
    filter:drop-shadow(0 0 6px rgba(79,216,255,.35)); }
  .cockpit.on { opacity:1; }
  .cockpit svg { width:100%; height:100%; display:block; }

  /* ---------- 特效 ---------- */
  #flash { position:fixed; inset:0; background:#dff6ff; opacity:0; pointer-events:none; z-index:40; }
  #vignette { position:fixed; inset:0; pointer-events:none; z-index:9;
    background:radial-gradient(ellipse at center, transparent 52%, rgba(1,10,22,.55) 100%); }
  #waterTint { position:fixed; inset:0; pointer-events:none; z-index:8; opacity:0; transition:opacity .4s;
    background:linear-gradient(rgba(10,95,140,.20), rgba(3,38,66,.42)); }

  /* ---------- 裝置自動切換 ---------- */
  body.desktop #stick, body.desktop #rightPad, body.desktop #btnGyro { display:none; }
  body.mobile #keysHint { display:none; }
  body.desktop .mOnly { display:none; }
  body.mobile .pcOnly { display:none; }
  #keysHint { position:fixed; left:14px; bottom:14px; z-index:30; pointer-events:none;
    background:rgba(4,20,36,.65); border:1px solid rgba(79,216,255,.45); border-radius:12px;
    padding:10px 14px; color:#bfe9ff; font-size:12px; line-height:1.9; letter-spacing:1px;
    text-shadow:0 0 6px rgba(79,216,255,.5); }
  #keysHint b { color:var(--cy); font-weight:800; background:rgba(79,216,255,.12);
    border:1px solid rgba(79,216,255,.4); border-radius:5px; padding:0 6px; margin-right:4px; }

  /* ---------- 開始畫面 ---------- */
  #start { position:fixed; inset:0; z-index:100; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:16px; text-align:center; color:#dff2ff;
    background:radial-gradient(120% 90% at 50% 0%, #0e3a5e 0%, #061c33 45%, #020a14 100%); }
  #start h1 { font-size:38px; font-weight:900; letter-spacing:8px;
    background:linear-gradient(90deg,#7fe6ff,#ffffff,#ff8fe0); -webkit-background-clip:text;
    background-clip:text; color:transparent; filter:drop-shadow(0 0 18px rgba(79,216,255,.5)); }
  #start .sub { font-size:12px; letter-spacing:6px; color:var(--cy); opacity:.9; margin-top:-8px; }
  #start p { font-size:13px; line-height:2; opacity:.92; }
  #startBtn { pointer-events:auto; font-size:19px; font-weight:900; letter-spacing:5px; color:#03131f;
    background:linear-gradient(120deg,#8ff0ff,#3ab6f0); border:none; border-radius:32px; padding:15px 54px;
    box-shadow:0 0 28px rgba(79,216,255,.55); }
  #startBtn:active { transform:scale(.95); }
  .tag { display:flex; gap:12px; font-size:19px; }
  .tag span { background:rgba(79,216,255,.08); border:1px solid rgba(79,216,255,.45);
    border-radius:12px; padding:7px 13px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="vignette"></div>
<div id="waterTint"></div>

<!-- 裝甲車：裝甲觀察窗 + 霓虹飾條 -->
<div class="cockpit" id="cpCar">
  <svg viewBox="0 0 100 100" preserveAspectRatio="none">
    <path d="M0,100 L0,80 L13,71 L87,71 L100,80 L100,100 Z" fill="#10181f"/>
    <path d="M0,80 L13,71 L87,71 L100,80 L100,81.6 L87,72.6 L13,72.6 L0,81.6 Z" fill="#4fd8ff" opacity=".85"/>
    <rect x="0" y="0" width="4.5" height="100" fill="#10181f"/>
    <rect x="95.5" y="0" width="4.5" height="100" fill="#10181f"/>
    <rect x="4.5" y="0" width=".7" height="100" fill="#ff4fd8" opacity=".7"/>
    <rect x="94.8" y="0" width=".7" height="100" fill="#ff4fd8" opacity=".7"/>
    <path d="M0,0 L100,0 L100,6 L0,6 Z" fill="#10181f"/>
    <rect x="0" y="6" width="100" height=".8" fill="#4fd8ff" opacity=".7"/>
  </svg>
</div>
<!-- 戰鬥機：座艙罩弧線 -->
<div class="cockpit" id="cpJet">
  <svg viewBox="0 0 100 100" preserveAspectRatio="none">
    <path d="M0,0 L16,0 C5,26 5,74 16,100 L0,100 Z" fill="#0d151c"/>
    <path d="M100,0 L84,0 C95,26 95,74 84,100 L100,100 Z" fill="#0d151c"/>
    <path d="M16,0 C5,26 5,74 16,100 L18.5,100 C8,74 8,26 18.5,0 Z" fill="#4fd8ff" opacity=".8"/>
    <path d="M84,0 C95,26 95,74 84,100 L81.5,100 C92,74 92,26 81.5,0 Z" fill="#4fd8ff" opacity=".8"/>
    <path d="M0,100 L100,100 L100,89 C70,81.5 30,81.5 0,89 Z" fill="#0d151c"/>
    <path d="M0,89 C30,81.5 70,81.5 100,89 L100,91 C70,83.5 30,83.5 0,91 Z" fill="#ff4fd8" opacity=".7"/>
  </svg>
</div>
<!-- 潛水艇：圓形舷窗 -->
<div class="cockpit" id="cpSub">
  <svg viewBox="0 0 100 100" preserveAspectRatio="none">
    <path d="M0,0 H100 V100 H0 Z M50,50 m-59,0 a59,59 0 1,0 118,0 a59,59 0 1,0 -118,0" fill="#0d151c" fill-rule="evenodd"/>
    <ellipse cx="50" cy="50" rx="59" ry="59" fill="none" stroke="#20323e" stroke-width="4"/>
    <ellipse cx="50" cy="50" rx="56" ry="56" fill="none" stroke="#4fd8ff" stroke-width=".9" opacity=".85"/>
    <ellipse cx="50" cy="50" rx="61.5" ry="61.5" fill="none" stroke="#ff4fd8" stroke-width=".7" opacity=".55"/>
  </svg>
</div>

<div class="hud" id="score">⭐ 0</div>
<div class="hud" id="gyroPill">📐 0.0°</div>
<div class="hud" id="modeName">DRIVE・裝甲車</div>
<div class="hud" id="alti"></div>
<div class="hud" id="speedo"><div id="speedNum">0</div><div id="speedUnit">KM / H</div></div>
<div class="hud" id="toast"></div>

<div id="modes">
  <button class="modeBtn active" id="mCar">🚙<small>DRIVE</small></button>
  <button class="modeBtn" id="mJet">✈️<small>FLY</small></button>
  <button class="modeBtn" id="mSub">🚢<small>DIVE</small></button>
</div>
<div id="tools">
  <button class="toolBtn" id="btnCam">🎥<small>視角</small></button>
  <button class="toolBtn" id="btnGyro">📐<small>水平儀</small></button>
</div>

<div id="stick"><div id="knob"></div></div>
<div id="rightPad">
  <button class="pad" id="btnFire">💥</button>
  <button class="pad" id="btnBrake">煞車</button>
  <button class="pad" id="btnGas">加速</button>
</div>

<div id="keysHint">
  <b>W A S D</b>轉向・升降　<b>Shift</b>加速　<b>B</b>煞車<br>
  <b>Space</b>射擊　<b>1 2 3</b>變身　<b>C</b>切換視角
</div>

<div id="flash"></div>

<div id="start">
  <h1>變形戰車</h1>
  <div class="sub">TRANSFORM RACER PRO</div>
  <div class="tag"><span>🚙 DRIVE</span><span>✈️ FLY</span><span>🚢 DIVE</span></div>
  <p class="mOnly">左搖桿：轉向／升降　右鍵:加速・煞車・射擊<br>
     🎥 切換第一／第三人稱,欣賞完整變身動畫<br>
     📐 開啟水平儀：傾斜手機即可轉向與升降<br>
     衝出公路落海變潛艇,水中加速上仰躍出變戰機!</p>
  <p class="pcOnly">WASD／方向鍵:轉向與升降　Shift:加速　B:煞車　空白鍵:射擊<br>
     1／2／3:變身　C:切換第一／第三人稱視角<br>
     衝出公路落海變潛艇,水中加速上仰躍出變戰機!</p>
  <button id="startBtn">啟動引擎</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
"use strict";
/* ================= 基本設定 ================= */
const CAR=0, JET=1, SUB=2;
const MODE_NAMES=["DRIVE・裝甲車","FLY・戰鬥機","DIVE・潛水艇"];
const ROAD_HALF=8, ROAD_TOP=3.5, ROAD_LEN=2100, WATER_Y=0, SEA_FLOOR=-42;
const CY=0x4fd8ff, MG=0xff4fd8;

const canvas=document.getElementById('c');
/* --- 裝置偵測:電腦→鍵盤配置,手機/平板→觸控配置 --- */
const isTouch = matchMedia('(pointer:coarse)').matches ||
                (navigator.maxTouchPoints>0 && !matchMedia('(pointer:fine)').matches);
document.body.classList.add(isTouch?'mobile':'desktop');
const renderer=new THREE.WebGLRenderer({canvas, antialias:true});
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.setSize(innerWidth,innerHeight);
renderer.outputEncoding=THREE.sRGBEncoding;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.08;

const scene=new THREE.Scene();
const SKY_FOG=new THREE.Color(0xcfe9f7), SEA_FOG=new THREE.Color(0x0a5a83);
scene.fog=new THREE.Fog(SKY_FOG.clone(), 260, 2500);

const camera=new THREE.PerspectiveCamera(74, innerWidth/innerHeight, .1, 5000);
scene.add(camera);

const hemi=new THREE.HemisphereLight(0xeaf6ff, 0x1e5a82, .9); scene.add(hemi);
const sunLight=new THREE.DirectionalLight(0xfff0cf, 1.15); sunLight.position.set(-400,520,-300); scene.add(sunLight);

function rand(a,b){ return a+Math.random()*(b-a); }
const clamp=THREE.MathUtils.clamp;

/* ================= 天空（漸層球）與太陽 ================= */
const skyMat=new THREE.ShaderMaterial({
  side:THREE.BackSide, depthWrite:false, fog:false,
  uniforms:{ top:{value:new THREE.Color(0x1e7fd0)}, mid:{value:new THREE.Color(0x6cc0ee)},
             bot:{value:new THREE.Color(0xe6f4fb)} },
  vertexShader:`varying vec3 vP; void main(){ vP=position;
    gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
  fragmentShader:`uniform vec3 top,mid,bot; varying vec3 vP;
    void main(){ float h=normalize(vP).y;
      vec3 c = h>0.0 ? mix(mid,top,pow(h,0.55)) : mix(mid,bot,pow(-h,0.5));
      gl_FragColor=vec4(c,1.0); }`
});
const sky=new THREE.Mesh(new THREE.SphereGeometry(3800,24,16), skyMat); scene.add(sky);

function glowTexture(inner,outer){
  const cv=document.createElement('canvas'); cv.width=cv.height=128;
  const ctx=cv.getContext('2d');
  const g=ctx.createRadialGradient(64,64,4,64,64,64);
  g.addColorStop(0,inner); g.addColorStop(1,outer);
  ctx.fillStyle=g; ctx.fillRect(0,0,128,128);
  const t=new THREE.CanvasTexture(cv); return t;
}
const sunSpr=new THREE.Sprite(new THREE.SpriteMaterial({
  map:glowTexture('rgba(255,250,230,1)','rgba(255,240,200,0)'),
  transparent:true, depthWrite:false, fog:false }));
sunSpr.scale.set(560,560,1); sunSpr.position.set(-1500,1400,-1900); scene.add(sunSpr);

/* ================= 海面 ================= */
const waterGeo=new THREE.PlaneGeometry(5200,5200,88,88);
waterGeo.rotateX(-Math.PI/2);
const waterBase=waterGeo.attributes.position.array.slice();
const waterMat=new THREE.MeshPhongMaterial({color:0x1d86c6, shininess:160, specular:0xbfe6ff,
  transparent:true, opacity:.9, side:THREE.DoubleSide});
const water=new THREE.Mesh(waterGeo, waterMat); water.position.y=WATER_Y; scene.add(water);

/* ================= 海底 ================= */
const floorGeo=new THREE.PlaneGeometry(5200,5200,40,40); floorGeo.rotateX(-Math.PI/2);
{ const p=floorGeo.attributes.position; for(let i=0;i<p.count;i++){ p.setY(i, Math.sin(i*1.7)*2.2); } }
const seaFloor=new THREE.Mesh(floorGeo, new THREE.MeshLambertMaterial({color:0xcdb87c}));
seaFloor.position.y=SEA_FLOOR; scene.add(seaFloor);

for(let i=0;i<70;i++){
  const r=new THREE.Mesh(new THREE.DodecahedronGeometry(rand(2,7)),
    new THREE.MeshLambertMaterial({color:0x6b7a70}));
  r.position.set(rand(-900,900), SEA_FLOOR+2, rand(-ROAD_LEN,ROAD_LEN));
  r.rotation.set(Math.random()*3,Math.random()*3,0); scene.add(r);
}
for(let i=0;i<90;i++){
  const g=new THREE.Mesh(new THREE.ConeGeometry(rand(.5,1),rand(6,14),5),
    new THREE.MeshLambertMaterial({color:0x2fae6a}));
  g.position.set(rand(-800,800), SEA_FLOOR+4, rand(-ROAD_LEN,ROAD_LEN)); scene.add(g);
}

/* ================= 跨海公路 ================= */
const road=new THREE.Mesh(new THREE.BoxGeometry(ROAD_HALF*2,1.2,ROAD_LEN*2),
  new THREE.MeshStandardMaterial({color:0x565c65, roughness:.9, metalness:.05}));
road.position.set(0,ROAD_TOP-.6,0); scene.add(road);
const railMat=new THREE.MeshStandardMaterial({color:0xdde3e8, roughness:.4, metalness:.5});
for(const s of [-1,1]){
  const rail=new THREE.Mesh(new THREE.BoxGeometry(.4,1,ROAD_LEN*2), railMat);
  rail.position.set(s*(ROAD_HALF-.2), ROAD_TOP+.5, 0); scene.add(rail);
}
const dashMat=new THREE.MeshBasicMaterial({color:0xfff3b0});
for(let z=-ROAD_LEN; z<ROAD_LEN; z+=14){
  const d=new THREE.Mesh(new THREE.BoxGeometry(.5,.05,6), dashMat);
  d.position.set(0,ROAD_TOP+.02,z); scene.add(d);
}
const pillarMat=new THREE.MeshStandardMaterial({color:0x9099a2, roughness:.7});
for(let z=-ROAD_LEN; z<=ROAD_LEN; z+=60){
  const p=new THREE.Mesh(new THREE.CylinderGeometry(1.6,2.2,ROAD_TOP-SEA_FLOOR,8), pillarMat);
  p.position.set(0,(ROAD_TOP+SEA_FLOOR)/2,z); scene.add(p);
}
for(let z=-ROAD_LEN+100; z<ROAD_LEN; z+=300){
  const arch=new THREE.Mesh(new THREE.TorusGeometry(ROAD_HALF+1.5,.35,8,24,Math.PI),
    new THREE.MeshStandardMaterial({color:0xff8c42, roughness:.5, metalness:.3}));
  arch.position.set(0,ROAD_TOP,z); scene.add(arch);
}

/* ================= 島嶼與棕櫚樹 ================= */
const trunkMat=new THREE.MeshLambertMaterial({color:0x8a5a33});
const leafMat=new THREE.MeshLambertMaterial({color:0x2f9e4f});
for(let i=0;i<26;i++){
  const x=(Math.random()<.5?-1:1)*rand(60,700), z=rand(-ROAD_LEN,ROAD_LEN), s=rand(14,42);
  const isl=new THREE.Mesh(new THREE.ConeGeometry(s,s*.55,7),
    new THREE.MeshLambertMaterial({color:0xe8d9a0}));
  isl.position.set(x, WATER_Y+s*.12, z); scene.add(isl);
  const top=new THREE.Mesh(new THREE.SphereGeometry(s*.5,7,5),
    new THREE.MeshLambertMaterial({color:0x4cb35e}));
  top.position.set(x, WATER_Y+s*.32, z); scene.add(top);
  const n=1+Math.floor(Math.random()*3);
  for(let t=0;t<n;t++){
    const tx=x+rand(-s*.3,s*.3), tz=z+rand(-s*.3,s*.3), h=rand(6,10);
    const trunk=new THREE.Mesh(new THREE.CylinderGeometry(.35,.5,h,5), trunkMat);
    trunk.position.set(tx, WATER_Y+s*.4+h/2, tz); scene.add(trunk);
    const leaf=new THREE.Mesh(new THREE.ConeGeometry(2.6,2,6), leafMat);
    leaf.position.set(tx, WATER_Y+s*.4+h+.8, tz); scene.add(leaf);
  }
}

/* ================= 雲 ================= */
const cloudMat=new THREE.MeshLambertMaterial({color:0xffffff});
for(let i=0;i<24;i++){
  const g=new THREE.Group();
  for(let j=0;j<3;j++){
    const c=new THREE.Mesh(new THREE.SphereGeometry(rand(8,16),7,5), cloudMat);
    c.scale.y=.55; c.position.set(j*10-10, rand(-2,2), rand(-4,4)); g.add(c);
  }
  g.position.set(rand(-1200,1200), rand(70,190), rand(-ROAD_LEN,ROAD_LEN));
  scene.add(g);
}

/* ================= 環境反射貼圖（讓金屬有賣相） ================= */

function partsOf(name){ return name==='wheels'?P.wheels:[P[name]]; }

function capturePose(){
  const snap={};
  for(const k of POSE_KEYS){
    snap[k]=partsOf(k).map(o=>({
      p:[o.position.x,o.position.y,o.position.z],
      r:[o.rotation.x,o.rotation.y,o.rotation.z],
      s:[o.scale.x,o.scale.y,o.scale.z]}));
  }
  return snap;
}
function applyPose(from,to,e){
  for(const k of POSE_KEYS){
    const objs=partsOf(k), tgt=to[k];
    objs.forEach((o,idx)=>{
      const f=from[k][idx];
      for(let i=0;i<3;i++){
        const axis='xyz'[i];
        if(tgt.p[i]!==null) o.position[axis]=f.p[i]+(tgt.p[i]-f.p[i])*e;
        o.rotation[axis]=f.r[i]+(tgt.r[i]-f.r[i])*e;
        o.scale[axis]=Math.max(.001, f.s[i]+(tgt.s[i]-f.s[i])*e);
      }
    });
  }
}

/* ================= 音效 ================= */
let AC=null, engineOsc=null, engineGain=null, engineFilter=null;
function initAudio(){
  if(AC) return;
  AC=new (window.AudioContext||window.webkitAudioContext)();
  engineOsc=AC.createOscillator(); engineOsc.type='sawtooth';
  engineFilter=AC.createBiquadFilter(); engineFilter.type='lowpass'; engineFilter.frequency.value=400;
  engineGain=AC.createGain(); engineGain.gain.value=0;
  engineOsc.connect(engineFilter).connect(engineGain).connect(AC.destination);
  engineOsc.start();
}
function beep(freq,dur,type,vol,slide){
  if(!AC) return;
  const o=AC.createOscillator(), g=AC.createGain();
  o.type=type||'sine'; o.frequency.value=freq;
  if(slide) o.frequency.exponentialRampToValueAtTime(slide, AC.currentTime+dur);
  g.gain.setValueAtTime(vol||.2, AC.currentTime);
  g.gain.exponentialRampToValueAtTime(.001, AC.currentTime+dur);
  o.connect(g).connect(AC.destination);
  o.start(); o.stop(AC.currentTime+dur);
}
function boom(){
  if(!AC) return;
  const len=AC.sampleRate*.4, buf=AC.createBuffer(1,len,AC.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  const s=AC.createBufferSource(); s.buffer=buf;
  const f=AC.createBiquadFilter(); f.type='lowpass'; f.frequency.value=600;
  const g=AC.createGain(); g.gain.value=.5;
  s.connect(f).connect(g).connect(AC.destination); s.start();
}

/* ================= 水平儀（陀螺儀）操控 ================= */
let gyroOn=false, gyroZero=null, gyroSteer=0, gyroVert=0, gyroDeg=0;
function screenAngle(){
  if(screen.orientation && typeof screen.orientation.angle==='number') return screen.orientation.angle;
  return (typeof window.orientation==='number')?window.orientation:0;
}
function onOrient(e){
  if(e.beta===null || e.gamma===null) return;
  const a=((screenAngle()%360)+360)%360;
  let s,v;
  if(a===0){ s=e.gamma; v=e.beta; }
  else if(a===90){ s=e.beta; v=-e.gamma; }
  else if(a===270){ s=-e.beta; v=e.gamma; }
  else { s=-e.gamma; v=-e.beta; }
  if(!gyroZero) gyroZero={s,v};
  const ds=s-gyroZero.s, dv=v-gyroZero.v;
  gyroDeg=ds;
  gyroSteer=clamp(ds/22,-1,1);
  gyroVert=clamp(-(dv)/22,-1,1);
}
function enableGyro(){
  gyroZero=null;
  addEventListener('deviceorientation',onOrient);
  gyroOn=true;
  el('btnGyro').classList.add('active');
  gyroPill.style.display='block';
  toast('水平儀操控啟動');
  beep(660,.2,'sine',.2,990);
}
function disableGyro(){
  removeEventListener('deviceorientation',onOrient);
  gyroOn=false; gyroSteer=0; gyroVert=0;
  el('btnGyro').classList.remove('active');
  gyroPill.style.display='none';
  toast('水平儀關閉');
}
el('btnGyro').addEventListener('pointerdown',()=>{
  initAudio();
  if(gyroOn){ disableGyro(); return; }
  if(typeof DeviceOrientationEvent!=='undefined' &&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(r=>{
      if(r==='granted') enableGyro();
      else toast('未取得感應器授權');
    }).catch(()=>toast('無法啟用感應器'));
  }else if(typeof DeviceOrientationEvent!=='undefined'){
    enableGyro();
  }else toast('此裝置不支援');
});

/* ================= 觸控輸入 ================= */
const input={ steer:0, vert:0, gas:false, brake:false };
let stickActive=false;
const stick=el('stick'), knob=el('knob');
let stickId=null;
function stickMove(t){
  const r=stick.getBoundingClientRect();
  let dx=(t.clientX-(r.left+r.width/2))/(r.width/2);
  let dy=(t.clientY-(r.top+r.height/2))/(r.height/2);
  const len=Math.hypot(dx,dy); if(len>1){ dx/=len; dy/=len; }
  input.steer=dx; input.vert=-dy;
  knob.style.transform=`translate(calc(-50% + ${dx*36}px), calc(-50% + ${dy*36}px))`;
}
stick.addEventListener('pointerdown',e=>{ stickId=e.pointerId; stickActive=true;
  stick.setPointerCapture(stickId); stickMove(e); initAudio(); });
stick.addEventListener('pointermove',e=>{ if(e.pointerId===stickId) stickMove(e); });
function stickEnd(e){ if(e.pointerId===stickId){ stickId=null; stickActive=false;
  input.steer=0; input.vert=0; knob.style.transform='translate(-50%,-50%)'; } }
stick.addEventListener('pointerup',stickEnd); stick.addEventListener('pointercancel',stickEnd);

function hold(id,key){ const b=el(id);
  b.addEventListener('pointerdown',e=>{ e.preventDefault(); input[key]=true; initAudio(); });
  b.addEventListener('pointerup',()=>input[key]=false);
  b.addEventListener('pointercancel',()=>input[key]=false);
  b.addEventListener('pointerleave',()=>input[key]=false);
}
hold('btnGas','gas'); hold('btnBrake','brake');
el('btnFire').addEventListener('pointerdown',e=>{ e.preventDefault(); initAudio(); fire(); });

addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft'||e.key==='a'){ input.steer=-1; stickActive=true; }
  if(e.key==='ArrowRight'||e.key==='d'){ input.steer=1; stickActive=true; }
  if(e.key==='ArrowUp'||e.key==='w'){ input.vert=1; stickActive=true; }
  if(e.key==='ArrowDown'||e.key==='s'){ input.vert=-1; stickActive=true; }
  if(e.key==='Shift') input.gas=true;
  if(e.key===' '){ initAudio(); fire(); }
  if(e.key==='b') input.brake=true;
  if(e.key==='1') requestMode(CAR);
  if(e.key==='2') requestMode(JET);
  if(e.key==='3') requestMode(SUB);
  if(e.key==='c') el('btnCam').dispatchEvent(new Event('pointerdown'));
});
addEventListener('keyup',e=>{
  if(['ArrowLeft','a','ArrowRight','d'].includes(e.key)){ input.steer=0; stickActive=false; }
  if(['ArrowUp','w','ArrowDown','s'].includes(e.key)){ input.vert=0; stickActive=false; }
  if(e.key==='Shift') input.gas=false;
  if(e.key==='b') input.brake=false;
});

/* 有效輸入 = 搖桿優先，否則水平儀 */
function effSteer(){ return stickActive?input.steer : (gyroOn?gyroSteer:input.steer); }
function effVert(){ return stickActive?input.vert : (gyroOn?gyroVert:input.vert); }

/* ================= 主迴圈 ================= */
const fwd=new THREE.Vector3();
let time=0;

function update(dt){
  time+=dt;
  const p=player;
  const steer=effSteer(), vert=effVert();

  /* --- 速度 --- */
  const maxSpd = p.mode===CAR?46 : p.mode===JET?86 : 26;
  const accel  = p.mode===JET?26 : 18;
  if(input.gas) p.speed=Math.min(maxSpd, p.speed+accel*dt);
  else p.speed=Math.max(0, p.speed - (p.mode===JET?3:7)*dt);
  if(input.brake) p.speed=Math.max(p.mode===JET?14:0, p.speed-34*dt);
  if(p.mode===JET) p.speed=Math.max(14, p.speed);

  /* --- 轉向 --- */
  const steerRate = p.mode===JET?1.25 : p.mode===SUB?1.1 : 1.7;
  const spdF=Math.min(1, p.speed/12);
  p.yaw -= steer*steerRate*dt*(p.mode===CAR?spdF:1);
  p.roll += ((-steer*(p.mode===JET?.55:.18))-p.roll)*Math.min(1,dt*5);

  /* --- 模式運動 --- */
  if(p.mode===CAR){
    p.pitch += (0-p.pitch)*Math.min(1,dt*6);
    fwd.set(-Math.sin(p.yaw),0,-Math.cos(p.yaw));
    p.pos.addScaledVector(fwd,p.speed*dt);
    const onRoad=overRoad();
    if(onRoad && !p.airborne && p.pos.y<=ROAD_TOP+1.8){
      p.pos.y=ROAD_TOP+1.4; p.vy=0;
    }else{
      p.airborne=true;
      p.vy-=28*dt; p.pos.y+=p.vy*dt;
      if(p.pos.y<WATER_Y+.5){
        splash(); setMode(SUB); p.airborne=false; p.vy=0;
        p.pos.y=WATER_Y-1.5;
      }else if(onRoad && p.pos.y<=ROAD_TOP+1.4){
        p.pos.y=ROAD_TOP+1.4; p.airborne=false; p.vy=0;
      }
    }
  }
  else if(p.mode===JET){
    const targetPitch=vert*.62;
    p.pitch += (targetPitch-p.pitch)*Math.min(1,dt*3.2);
    fwd.set(-Math.sin(p.yaw)*Math.cos(p.pitch), Math.sin(p.pitch), -Math.cos(p.yaw)*Math.cos(p.pitch));
    p.pos.addScaledVector(fwd,p.speed*dt);
    if(p.speed<20) p.pos.y-=10*dt;
    if(p.pos.y>300) p.pos.y=300;
    if(overRoad() && p.pos.y<=ROAD_TOP+2 && p.pos.y>ROAD_TOP-1 && p.pitch<0.08){
      p.pos.y=ROAD_TOP+1.4; setMode(CAR); p.pitch=0;
    }else if(p.pos.y<WATER_Y+.3){
      splash(); setMode(SUB);
    }
  }
  else{
    const targetPitch=vert*.5;
    p.pitch += (targetPitch-p.pitch)*Math.min(1,dt*3);
    fwd.set(-Math.sin(p.yaw)*Math.cos(p.pitch), Math.sin(p.pitch), -Math.cos(p.yaw)*Math.cos(p.pitch));
    p.pos.addScaledVector(fwd,p.speed*dt);
    if(p.pos.y<SEA_FLOOR+4) p.pos.y=SEA_FLOOR+4;
    if(p.pos.y>WATER_Y-.4){
      if(p.pitch>.25 && p.speed>16){
        splash(); setMode(JET); p.pos.y=WATER_Y+2;
      }else p.pos.y=WATER_Y-.4;
    }
    if(p.speed>4 && Math.random()<dt*18){
      const b=bubbles[bubbleIdx++%bubbles.length];
      b.visible=true; b.material.opacity=.7;
      b.position.copy(p.pos).add(new THREE.Vector3(rand(-1,1),-1,rand(-1,1)));
      b.userData={life:1.6};
    }
  }
  p.pos.x=clamp(p.pos.x,-1400,1400);
  p.pos.z=clamp(p.pos.z,-ROAD_LEN-200,ROAD_LEN+200);

  /* --- 載具模型姿態 --- */
  vehicle.position.copy(p.pos);
  vehicle.rotation.set(p.pitch, p.yaw, p.roll*1.6, 'YXZ');
  /* 車輪轉動與噴焰脈動 */
  if(p.mode===CAR) for(const w of P.wheels) w.userData.spin.rotation.x+=p.speed*dt*1.6;
  if(p.mode===SUB) P.prop.rotation.z+=dt*(4+p.speed*.5);
  if(morphT>=1) P.flame.scale.y=POSE[p.mode].flame.s[1]*(1+(input.gas?.4:.08)*Math.abs(Math.sin(time*30)));

  /* --- 變身動畫 --- */
  if(morphT<1){
    morphT=Math.min(1, morphT+dt/1.1);
    const t=morphT, c1=1.70158, c3=c1+1;
    const e=1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2);   /* easeOutBack 回彈 */
    applyPose(morphFrom,morphTo,e);
    const spin=t*t*(3-2*t)*Math.PI*2;                       /* 全程 360° 翻滾 */
    vehicle.rotateZ(spin);
  }
  if(shockT<1){
    shockT=Math.min(1, shockT+dt/0.7);
    shock.position.copy(p.pos);
    const s=.5+shockT*14;
    shock.scale.set(s,s,s);
    shockMat.opacity=.85*(1-shockT);
    if(shockT>=1) shock.visible=false;
  }
  if(shock2T<1){
    shock2T=Math.min(1, shock2T+dt/0.7);
    if(shock2T>0){
      shock2.visible=true;
      shock2.position.copy(p.pos);
      const s2=.5+shock2T*18;
      shock2.scale.set(s2,s2,s2);
      shock2Mat.opacity=.7*(1-shock2T);
    }
    if(shock2T>=1) shock2.visible=false;
  }

  /* --- 相機 --- */
  fovPulse=Math.max(0,fovPulse-dt*2);
  if(firstPerson){
    camera.position.copy(p.pos);
    camera.rotation.set(p.pitch, p.yaw, p.roll, 'YXZ');
    joy.rotation.x=-effVert()*.35; joy.rotation.z=-effSteer()*.35;
  }else{
    const dist = p.mode===JET?13 : 10;
    const h    = p.mode===JET?4.2 : 3.4;
    fwd.set(-Math.sin(p.yaw),0,-Math.cos(p.yaw));
    tmpV.copy(p.pos).addScaledVector(fwd,-dist); tmpV.y+=h;
    if(p.mode!==SUB && tmpV.y<WATER_Y+1.2 && p.pos.y>WATER_Y) tmpV.y=WATER_Y+1.2;
    camera.position.lerp(tmpV,Math.min(1,dt*5));
    const look=tmpV.copy(p.pos).addScaledVector(fwd,8); look.y+=1;
    camera.lookAt(look);
    camera.rotation.z+=p.roll*.35;
  }
  camera.fov=74+Math.min(14,p.speed*.16)+fovPulse*10;
  camera.updateProjectionMatrix();
  if(p.speed>30 && firstPerson){ camera.position.x+=rand(-.05,.05); camera.position.y+=rand(-.05,.05); }

  /* --- 假陰影 --- */
  const gy=overRoad()?ROAD_TOP+.06:WATER_Y+.15;
  blob.position.set(p.pos.x,gy,p.pos.z);
  const hgt=p.pos.y-gy;
  blob.visible=(p.mode!==SUB && hgt>-1 && hgt<45);
  blob.material.opacity=clamp(1-hgt/45,0,0.9);

  /* --- 海面波浪 --- */
  const wp=waterGeo.attributes.position.array;
  for(let i=0;i<wp.length;i+=3){
    wp[i+1]=waterBase[i+1]+Math.sin(waterBase[i]*.015+time*1.3)*1.1
                          +Math.cos(waterBase[i+2]*.02+time*.9)*.9;
  }
  waterGeo.attributes.position.needsUpdate=true;
  waterGeo.computeVertexNormals();
  water.position.x=p.pos.x; water.position.z=p.pos.z;
  seaFloor.position.x=p.pos.x; seaFloor.position.z=p.pos.z;
  sky.position.copy(camera.position);

  /* --- 水上/水下氣氛 --- */
  const under=camera.position.y<WATER_Y;
  if(under){
    scene.fog.color.lerp(SEA_FOG,Math.min(1,dt*4));
    scene.fog.near=6; scene.fog.far=200;
    hemi.intensity=.5; tintEl.style.opacity=1; sunSpr.visible=false;
  }else{
    scene.fog.color.lerp(SKY_FOG,Math.min(1,dt*4));
    scene.fog.near=260; scene.fog.far=2500;
    hemi.intensity=.9; tintEl.style.opacity=0; sunSpr.visible=true;
  }

  /* --- 金環 --- */
  for(const r of rings){
    if(!r.userData.alive) continue;
    r.rotation.y+=dt*1.5;
    if(r.position.distanceTo(p.pos)<6.2){
      r.userData.alive=false; r.visible=false;
      score+=10; scoreEl.textContent='⭐ '+score;
      toast('+10'); beep(880,.15,'sine',.25,1320);
      burst(r.position,0xffd75e,10,8,.7);
    }
  }
  /* --- 目標 --- */
  for(const t of targets){
    if(!t.userData.alive) continue;
    if(t.userData.type==='buoy') t.position.y=t.userData.baseY+Math.sin(time*2+t.position.z)*0.8;
    else t.position.y=t.userData.baseY+Math.sin(time+t.position.x)*1.5;
    if(t.position.distanceTo(p.pos)<4) killTarget(t);
  }
  /* --- 子彈 --- */
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.position.addScaledVector(b.userData.v,dt);
    b.userData.life-=dt;
    let hit=false;
    for(const t of targets){
      if(t.userData.alive && b.position.distanceTo(t.position)<4){ killTarget(t); hit=true; break; }
    }
    if(hit || b.userData.life<=0){ scene.remove(b); bullets.splice(i,1); }
  }
  /* --- 粒子 --- */
  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];
    pt.userData.life-=dt;
    pt.position.addScaledVector(pt.userData.v,dt);
    pt.userData.v.y-=6*dt;
    pt.material.opacity=pt.userData.life/pt.userData.max;
    if(pt.userData.life<=0){ scene.remove(pt); particles.splice(i,1); }
  }
  for(const b of bubbles){
    if(!b.visible) continue;
    b.userData.life-=dt;
    b.position.y+=6*dt;
    b.material.opacity=Math.min(.7,b.userData.life);
    if(b.userData.life<=0 || b.position.y>WATER_Y) b.visible=false;
  }
  /* --- 魚 --- */
  for(const f of fishes){
    const u=f.userData; const a=time*u.sp+u.ph;
    f.position.set(u.cx+Math.cos(a)*u.r, u.y, u.cz+Math.sin(a)*u.r);
    f.rotation.y=-a;
  }
  /* --- 引擎音 --- */
  if(AC && engineGain){
    const base=p.mode===JET?120 : p.mode===SUB?55 : 70;
    engineOsc.frequency.value=base+p.speed*(p.mode===JET?3.2:4);
    engineFilter.frequency.value=300+p.speed*14;
    engineGain.gain.value=Math.min(.14, .02+p.speed*.002);
  }
  /* --- HUD --- */
  const kmh=Math.round(p.speed*3.6);
  speedEl.textContent=kmh;
  let extra='';
  if(p.mode===JET) extra='ALT '+Math.max(0,Math.round(p.pos.y))+' m';
  else if(p.mode===SUB) extra='DEPTH '+Math.max(0,Math.round(-p.pos.y))+' m';
  altiEl.textContent=extra;
  if(gyroOn) gyroPill.textContent='📐 '+gyroDeg.toFixed(1)+'°';
  holoTimer-=dt;
  if(firstPerson && holoTimer<=0){ holoTimer=.1; drawHolo(kmh,p.mode,extra||'READY'); }
}

function killTarget(t){
  t.userData.alive=false; t.visible=false;
  score+=25; scoreEl.textContent='⭐ '+score;
  toast('+25 擊破！');
  const col=t.userData.type==='balloon'?0xff6b5e : t.userData.type==='buoy'?0xffab4a : 0x8fb6c9;
  burst(t.position,col,16,14,.9);
  boom();
}
function splash(){
  burst(new THREE.Vector3(player.pos.x,WATER_Y+.5,player.pos.z),0xdff4ff,22,12,.8);
  beep(240,.35,'triangle',.3,90);
}

/* ================= 啟動 ================= */
refreshCockpitVis();
let last=0, running=false;
function loop(t){
  requestAnimationFrame(loop);
  if(!running) return;
  if(!envReady) captureEnv();
  const dt=Math.min(.05,(t-last)/1000||.016); last=t;
  update(dt);
  renderer.render(scene,camera);
}
requestAnimationFrame(loop);

el('startBtn').addEventListener('pointerdown',()=>{
  initAudio(); if(AC && AC.state==='suspended') AC.resume();
  el('start').style.display='none'; running=true; last=performance.now();
  toast('出發！');
});

addEventListener('resize',()=>{
  camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});
})();
</script>
</body>
</html>
